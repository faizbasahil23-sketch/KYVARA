apiVersion: apps/v1

kind: Deployment

metadata:

  name: kyvara-api

spec:

  replicas: 2

  selector:

    matchLabels:

      app: kyvara

  template:

    metadata:

      labels:

        app: kyvara

    spec:

      containers:

      - name: kyvara-api

        image: kyvara:latest

        imagePullPolicy: Never

        ports:

        - containerPort: 8080
